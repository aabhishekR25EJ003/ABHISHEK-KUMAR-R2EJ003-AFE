<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Showcase - helloworld.py</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --py-keyword: #f472b6;
            --py-string: #34d399;
            --py-builtin: #fbbf24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 740px;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-family: monospace;
        }

        .header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        /* IDE/Editor Window Styling */
        .editor-window {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Top Window Bar */
        .window-bar {
            background-color: #111827;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .window-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #f59e0b; }
        .dot-green { background-color: #10b981; }

        .file-name {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        /* Code & Terminal Content Area */
        .editor-body {
            padding: 24px;
            margin: 0;
            overflow-x: auto;
        }

        .code-block {
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
            white-space: pre;
        }

        /* Custom Simulated Syntax Highlighting */
        .token.keyword { color: var(--py-keyword); font-weight: bold; }
        .token.builtin { color: var(--py-builtin); }
        .token.string { color: var(--py-string); }

        /* Output Console Section */
        .output-section {
            margin-top: 20px;
        }

        .output-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .console {
            background-color: #020617;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #34d399; /* Terminal Green */
        }

        .console-prefix {
            color: var(--text-muted);
            user-select: none;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <h1>helloworld.py <span class="badge">Python 3.x</span></h1>
        <p>A pristine, foundational script demonstrating standard output stream execution.</p>
    </div>

    <div class="editor-window">
        <div class="window-bar">
            <div class="window-dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div class="file-name">src/helloworld.py</div>
            <button class="copy-btn" onclick="copyCode()">Copy</button>
        </div>
        
        <div class="editor-body">
<pre class="code-block" id="python-code"><span class="token builtin">print</span>(<span class="token font-string">"Hello World"</span>)</pre>
        </div>
    </div>

    <div class="output-section">
        <div class="output-title">Standard Output (stdout)</div>
        <div class="console">
            <span class="console-prefix">$ python3 helloworld.py</span><br>
            Hello World
        </div>
    </div>

</div>

<script>
    function copyCode() {
        const codeText = "print(\"Hello World\")";
        navigator.clipboard.writeText(codeText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Copied!';
            btn.style.borderColor = '#34d399';
            btn.style.color = '#34d399';
            setTimeout(() => {
                btn.innerText = 'Copy';
                btn.style.borderColor = 'var(--border)';
                btn.style.color = 'var(--text-muted)';
            }, 2000);
        });
    }
</script>

</body>
</html>
